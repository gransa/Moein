name: Generate JSON Client Configs

on:
  schedule:
    - cron: '23 * * * *'
  push:
    paths:
      - 'Configs.txt'
  workflow_dispatch:

jobs:
  build-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - name: Compile Profile Array Layouts
        run: |
          echo "--- Pre-Run Cleanup ---"
          # Force removal of the old output to ensure a clean slate
          rm -f NG-JSON-Configs.txt
          
          echo "--- Input File Preview ---"
          head -n 10 Configs.txt
          
          echo "--- Running Conversion ---"
          python convert_to_json.py
          
          # Validation
          if [ ! -s NG-JSON-Configs.txt ]; then
            echo "::error::Output file NG-JSON-Configs.txt is empty or missing!"
            exit 1
          fi
          
          echo "--- Post-Run Check ---"
          ls -lh NG-JSON-Configs.txt

      - name: Commit and Push
        run: |
          git config user.name "JSON Compiler Engine"
          git config user.email "action@github.com"
          
          # Stage the file
          git add NG-JSON-Configs.txt
          
          # Check for changes
          if git diff --cached --quiet; then
            echo "SUCCESS: The generated JSON matches the existing version."
            echo "No new changes to commit."
          else
            echo "CHANGES DETECTED: Committing..."
            git commit -m "Automated Sync: Update compiled v2rayNG profiles layout block"
            git push
          fi

name: Generate JSON Client Configs

on:
  schedule:
    - cron: '23 * * * *'
  push:
    paths:
      - 'Configs.txt'
  workflow_dispatch:

jobs:
  build-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0 # Ensure we have history to detect changes

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - name: Run Conversion Script
        run: |
          python convert_to_json.py
          # Verification: Check if file exists and has content
          if [ ! -s NG-JSON-Configs.txt ]; then
            echo "::error::Output file is empty or missing!"
            exit 1
          fi
          echo "File generation complete. Current size:"
          ls -lh NG-JSON-Configs.txt

      - name: Commit and Push
        run: |
          git config user.name "JSON Compiler Engine"
          git config user.email "action@github.com"
          
          # Add the file
          git add NG-JSON-Configs.txt
          
          # Check for changes
          if git diff --staged --quiet; then
            echo "No changes detected between current file and last commit."
            echo "This means the script output matches the existing file exactly."
          else
            echo "Changes detected. Committing..."
            git commit -m "Automated Sync: Update compiled v2rayNG profiles layout block"
            git push
          fi

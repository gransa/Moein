name: Generate JSON Client Configs

on:
  push:
    paths:
      - 'Configs.txt'
  workflow_dispatch:

jobs:
  build-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository Codebase
        uses: actions/checkout@v4.2.2

      - name: Set up Runtime Python Environment
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - name: Compile Profile Array Layouts
        run: python convert_to_json.py

      - name: Commit and Push Compiled Client Artifact
        run: |
          if [ ! -s NG-JSON-Configs.txt ]; then
            echo "⚠️ Empty asset generated. Aborting sync cycle."
            exit 0
          fi

          git config user.name "JSON Compiler Engine"
          git config user.email "action@github.com"
          git add NG-JSON-Configs.txt
          
          if git diff --staged --quiet; then
            echo "No pipeline formatting adjustments required."
          else
            git commit -m "Automated Sync: Update compiled v2rayNG profiles layout block"
            git push
          fi

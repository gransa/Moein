name: Hourly Certificate Fingerprint Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-runs-on: ubuntu-latest
    # FIX #1: Grants the github-actions[bot] write access to push changes
    permissions:
      contents: write

    steps:
      - name: Checkout Repository Codebase
        uses: actions/checkout@v4

      - name: Set up Runtime Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Network Packages
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch and Process Node Upgrades
        env:
          EXTERNAL_SUB_URL: ${{ secrets.EXTERNAL_SUB_URL }}
        run: python update_fingerprints.py

      - name: Commit and Push Verified Updates
        run: |
          # FIX #2: Safety check to protect existing data if network was unreachable
          if [ ! -s Configs.txt ]; then
            echo "⚠️ Warning: Configs.txt is empty. Skipping commit to protect active nodes."
            exit 0
          fi

          git config user.name "Fingerprint Updater"
          git config user.email "action@github.com"
          git add Configs.txt
          
          if git diff --staged --quiet; then
            echo "No certificate fingerprint changes found this hour."
          else
            git commit -m "Update fingerprints - $(date '+%Y-%m-%d %H:%M:%S')"
            
            # NEW FIX: Pull remote updates to prevent push rejections
            git pull --rebase origin main
            
            git push origin main
          fi

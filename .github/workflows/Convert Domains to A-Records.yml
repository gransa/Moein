name: Convert Domains to A-Records

on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  workflow_dispatch: # Allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  run-converter:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run Conversion Script
      # Space characters in file names must be wrapped in quotes
      run: python "Convert Domains to A-Records.py"

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add Cloudflare-IPs.txt
        if git diff --cached --quiet; then
          echo "No changes found in the resolved IPs."
        else
          git commit -m "Automated update: Refreshed plain Cloudflare-IPs list"
          git push
        fi

name: Hourly Fingerprint Updater

on:
  schedule:
    # This tells GitHub to run the workflow at the start of every hour automatically
    - cron: '0 * * * *'
  workflow_dispatch: # Allows you to still run it manually whenever you want

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Update Certificate Fingerprints
        run: python update_fingerprints.py
        env:
          EXTERNAL_SUB_URL: ${{ secrets.EXTERNAL_SUB_URL || vars.EXTERNAL_SUB_URL }}

      - name: Commit and Push changes
        run: |
          git config user.name "Fingerprint Updater"
          git config user.email "action@github.com"
          git add Configs.txt
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update fingerprints - $(date '+%Y-%m-%d %H:%M:%S')"
            git push
          fi
